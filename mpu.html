<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>3D Ovladač</title>
    <style>
        body { margin: 0; overflow: hidden; background: #121212; color: white; font-family: sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 12px; 
            border: 1px solid #00ff88; width: 260px;
        }
        button, input { margin-bottom: 10px; display: block; width: 100%; padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-size: 13px; font-weight: bold; }
        #btnWifi { background: #00ff88; color: black; }
        #btnUsb { background: #00aaff; color: white; }
        #calibrate { background: #ffaa00; color: black; }
        #testModel { background: #333; color: white; }
        input[type="text"] { background: #222; color: #00ff88; border: 1px solid #444; cursor: text; width: calc(100% - 24px); }
        label { display: block; margin-bottom: 5px; color: #777; font-size: 10px; text-transform: uppercase; }
        #status { font-size: 0.85em; color: #ffcc00; margin: 10px 0; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <label>IP Adresa:</label>
        <input type="text" id="ipAddress" value="192.168.1.222">
        <button id="btnWifi">WI-FI</button>
        <button id="btnUsb">USB</button>
        <div id="status">---</div>
        <button id="calibrate">VYNULOVAT</button>
        <button id="testModel">TEST</button>
        <label style="margin-top:15px;">Model STL:</label>
        <input type="file" id="fileInput" accept=".stl">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, model, controls, socket;
        let sensorGroup = new THREE.Group();
        let qOffset = new THREE.Quaternion();
        let currentQuaternion = new THREE.Quaternion();

        function init() {
            scene = new THREE.Scene();
            scene.add(sensorGroup);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x121212);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);
            scene.add(new THREE.GridHelper(30, 30, 0x00ff88, 0x222222));
        }

        function handleData(csv) {
            const parts = csv.split(',');
            if (parts.length === 3) {
                const rawX = parseFloat(parts[0]);
                const rawY = parseFloat(parts[1]);
                const rawZ = parseFloat(parts[2]);
                if (!isNaN(rawX) && !isNaN(rawY) && !isNaN(rawZ)) {
                    const xRad = rawY * (Math.PI / 180);
                    const yRad = rawZ * (Math.PI / 180);
                    const zRad = rawX * (Math.PI / 180);
                    const euler = new THREE.Euler(xRad, yRad, zRad, 'YXZ');
                    currentQuaternion.setFromEuler(euler);
                    if (model) {
                        sensorGroup.quaternion.copy(qOffset).invert().multiply(currentQuaternion);
                    }
                }
            }
        }

        document.getElementById('btnWifi').onclick = () => {
            const ip = document.getElementById('ipAddress').value;
            if (socket) socket.close();
            socket = new WebSocket(`ws://${ip}:81`);
            socket.onopen = () => document.getElementById('status').innerText = "WI-FI OK";
            socket.onmessage = (e) => handleData(e.data);
            socket.onerror = () => document.getElementById('status').innerText = "CHYBA";
        };

        document.getElementById('btnUsb').onclick = async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerText = "USB OK";
                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();
                let lineBuf = "";
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    lineBuf += value;
                    let lines = lineBuf.split("\n");
                    lineBuf = lines.pop();
                    for (let l of lines) handleData(l.trim());
                }
            } catch (e) { document.getElementById('status').innerText = "USB OFF"; }
        };

        document.getElementById('calibrate').onclick = () => {
            qOffset.copy(currentQuaternion);
            document.getElementById('status').innerText = "RESET";
        };

        function loadModel(geometry, materials) {
            if (model) sensorGroup.remove(model);
            geometry.computeBoundingBox();
            const center = new THREE.Vector3();
            geometry.boundingBox.getCenter(center);
            geometry.translate(-center.x, -center.y, -center.z);
            const size = new THREE.Vector3();
            geometry.boundingBox.getSize(size);
            const scale = 6 / Math.max(size.x, size.y, size.z);
            model = new THREE.Mesh(geometry, materials);
            model.scale.set(scale, scale, scale);
            sensorGroup.add(model);
        }

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const geom = new THREE.STLLoader().parse(ev.target.result);
                loadModel(geom, new THREE.MeshPhongMaterial({color: 0x00aaff}));
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        document.getElementById('testModel').onclick = () => {
            const geom = new THREE.BoxGeometry(6, 0.4, 4);
            const mats = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff].map(c => new THREE.MeshPhongMaterial({color: c}));
            loadModel(geom, mats);
        };

        init();
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();

        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        };
    </script>
</body>
</html>
