<!DOCTYPE html>
<html>
<head>
    <title>MPU6050 STL Prohlížeč - Test Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #121212; color: white; font-family: 'Segoe UI', sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; 
            border: 1px solid #00ff88; width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button, input { margin-bottom: 12px; display: block; width: 100%; padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-size: 14px; transition: 0.2s; }
        #connect { background: #00ff88; color: black; font-weight: bold; text-transform: uppercase; }
        #calibrate { background: #ffaa00; color: black; font-weight: bold; display: none; text-transform: uppercase; }
        #testModel { background: #00aaff; color: white; font-weight: bold; text-transform: uppercase; }
        #testModel:hover { background: #0088cc; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 11px; text-transform: uppercase; }
        .controls-info { font-size: 0.8em; color: #00ff88; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; line-height: 1.6; }
        #status { font-size: 0.85em; color: #ffcc00; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin-top:0; color:#00ff88;">STL Ovladač</h2>
        <button id="connect">Připojit ESP32</button>
        <button id="calibrate">Nulovat model</button>
        <button id="testModel">Testovací model</button>
        
        <label>Nahrát vlastní STL:</label>
        <input type="file" id="fileInput" accept=".stl">
        
        <div id="status">Čekám na akci...</div>

        <div class="controls-info">
            <b>Ovládání:</b><br>
            • Senzor: Rotace modelu<br>
            • Myš: Volná rotace scény<br>
            • Kolečko: Přiblížení (Zoom)
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, model, controls, writer;
        let sensorGroup = new THREE.Group();

        let lastRawX = 0, lastRawY = 0, lastRawZ = 0;
        let offsetX = 0, offsetY = 0, offsetZ = 0;

        function init() {
            scene = new THREE.Scene();
            scene.add(sensorGroup);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x121212);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
            light1.position.set(10, 10, 10);
            scene.add(light1);
            const light2 = new THREE.AmbientLight(0x404040, 2);
            scene.add(light2);

            const grid = new THREE.GridHelper(30, 30, 0x00ff88, 0x222222);
            grid.position.y = -2;
            scene.add(grid);
        }

        function addModelToScene(geometry, material) {
            if (model) sensorGroup.remove(model);
            
            model = new THREE.Mesh(geometry, material);
            
            geometry.computeBoundingBox();
            const center = new THREE.Vector3();
            geometry.boundingBox.getCenter(center);
            geometry.translate(-center.x, -center.y, -center.z);
            
            sensorGroup.add(model);
            
            const size = geometry.boundingBox.getSize(new THREE.Vector3()).length();
            camera.position.z = size * 2;
            controls.update();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const loader = new THREE.STLLoader();
                const geometry = loader.parse(event.target.result);
                const material = new THREE.MeshPhongMaterial({ color: 0x00aaff, specular: 0x111111, shininess: 100 });
                addModelToScene(geometry, material);
                document.getElementById('status').innerText = "Vlastní model načten!";
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('testModel').addEventListener('click', () => {
            const geometry = new THREE.BoxGeometry(4, 1, 6);

            const materials = [
                new THREE.MeshPhongMaterial({color: 0xff0000}), // vpravo
                new THREE.MeshPhongMaterial({color: 0x00ff00}), // vlevo
                new THREE.MeshPhongMaterial({color: 0x0000ff}), // nahoře
                new THREE.MeshPhongMaterial({color: 0xffff00}), // dole
                new THREE.MeshPhongMaterial({color: 0xff00ff}), // vepředu
                new THREE.MeshPhongMaterial({color: 0x00ffff})  // vzadu
            ];
            
            if (model) sensorGroup.remove(model);
            model = new THREE.Mesh(geometry, materials);
            sensorGroup.add(model);
            
            camera.position.set(8, 8, 8);
            controls.update();
            document.getElementById('status').innerText = "Testovací kvádr aktivní";
        });

        document.getElementById('calibrate').addEventListener('click', async () => {
            if (writer) {
                try { await writer.write(new TextEncoder().encode("K")); } catch(e) {}
            }
            offsetX = lastRawX;
            offsetY = lastRawY;
            offsetZ = lastRawZ;
            controls.reset();
            document.getElementById('status').innerText = "Model vynulován!";
        });

        document.getElementById('connect').addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                writer = port.writable.getWriter();
                document.getElementById('calibrate').style.display = "block";
                document.getElementById('connect').style.display = "none";
                document.getElementById('status').innerText = "Senzor připojen!";

                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();

                let buffer = "";
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += value;
                    if (buffer.includes('\n')) {
                        let lines = buffer.split('\n');
                        let dataStr = lines[lines.length - 2].split(',');
                        if (dataStr.length === 3) {
                            lastRawX = parseFloat(dataStr[0]);
                            lastRawY = parseFloat(dataStr[1]);
                            lastRawZ = parseFloat(dataStr[2]);

                            let finalX = lastRawX - offsetX;
                            let finalY = lastRawY - offsetY;
                            let finalZ = lastRawZ - offsetZ;

                            if (model) {
                                sensorGroup.rotation.x = -finalY * (Math.PI / 180);
                                sensorGroup.rotation.z = -finalX * (Math.PI / 180);
                                sensorGroup.rotation.y = finalZ * (Math.PI / 180);
                            }
                        }
                        buffer = lines[lines.length - 1];
                    }
                }
            } catch (e) { 
                alert("Chyba: " + e); 
            }
        });

        init();
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        };
    </script>
</body>
</html>
